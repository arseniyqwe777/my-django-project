{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h3 class="mb-0">
                    <i class="fas fa-edit"></i> {{ title }}
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i>
                        Редактирование автора: <strong>{{ author.full_name }}</strong>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="{{ form.last_name.id_for_label }}" class="form-label">
                                Фамилия <span class="text-danger">*</span>
                            </label>
                            {{ form.last_name }}
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="{{ form.first_name.id_for_label }}" class="form-label">
                                Имя <span class="text-danger">*</span>
                            </label>
                            {{ form.first_name }}
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="{{ form.middle_name.id_for_label }}" class="form-label">
                                Отчество
                            </label>
                            {{ form.middle_name }}
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="{{ form.birth_year.id_for_label }}" class="form-label">
                                Год рождения
                            </label>
                            {{ form.birth_year }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="{{ form.death_year.id_for_label }}" class="form-label">
                                Год смерти
                            </label>
                            {{ form.death_year }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.biography.id_for_label }}" class="form-label">
                            Биография
                        </label>
                        {{ form.biography }}
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'author_detail' author.id %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Сохранить изменения
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
