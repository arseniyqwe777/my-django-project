{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h3 class="mb-0">
                    <i class="fas fa-user-plus"></i> {{ title }}
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i>
                        Назначение автора для книги: <strong>{{ book.title }}</strong>
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.author.id_for_label }}" class="form-label">
                            Автор
                        </label>
                        {{ form.author }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.role.id_for_label }}" class="form-label">
                            Роль автора
                        </label>
                        {{ form.role }}
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'book_detail' book.id %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Назад к книге
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Назначить автора
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
