{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-white text-center">
                <h3 class="mb-0">
                    <i class="fas fa-user-plus"></i> Регистрация
                </h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя *</label>
                        <input type="text" name="username" id="username" class="form-control" required>
                        <small class="form-text text-muted">Только буквы, цифры и @/./+/-/_</small>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль *</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                        <small class="form-text text-muted">Минимум 6 символов</small>
                    </div>

                    <div class="mb-3">
                        <label for="password2" class="form-label">Подтверждение пароля *</label>
                        <input type="password" name="password2" id="password2" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-check-circle"></i> Зарегистрироваться
                    </button>
                </form>

                <hr>

                <div class="text-center">
                    <p class="mb-0">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
