{% extends 'base.html' %}

{% block title %}404 — Страница не найдена | BookBridge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body py-5">
                <i class="fas fa-search fa-5x text-muted mb-4"></i>
                <h1 class="display-1 text-primary" style="font-family: 'Playfair Display', serif;">404</h1>
                <h3 class="mb-3">Страница не найдена</h3>
                <p class="text-muted">К сожалению, запрашиваемая страница не существует или была перемещена.</p>
                <a href="{% url 'main' %}" class="btn btn-primary mt-3">
                    <i class="fas fa-home"></i> На главную
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
