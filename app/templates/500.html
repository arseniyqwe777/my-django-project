{% extends 'base.html' %}

{% block title %}500 — Ошибка сервера | BookBridge{% endblock %}

{% block content %}

    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body py-5">
                <i class="fas fa-exclamation-triangle fa-5x text-danger mb-4"></i>
                <h1 class="display-1 text-danger" style="font-family: 'Playfair Display', serif;">500</h1>
                <h3 class="mb-3">Внутренняя ошибка сервера</h3>

                <a href="{% url 'main' %}" class="btn btn-primary mt-3">

            </div>
        </div>
    </div>
